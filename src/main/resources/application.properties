spring.application.name=pdfpodcast
server.port=8081
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/pdfpodcast;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

pdf.max-file-size=52428800
pdf.max-text-length=120000

openai.enabled=true
openai.api-key=${OPENAI_API_KEY:}
openai.api-url=https://api.openai.com/v1/responses
openai.model=gpt-4.1-mini
openai.chunk-size=2400
openai.max-context-chunks=6
openai.retry.max-attempts=3
openai.retry.delay-ms=1500

tts.enabled=true
tts.elevenlabs.api-key=${ELEVENLABS_API_KEY:}
tts.elevenlabs.api-url=https://api.elevenlabs.io/v1/text-to-speech
tts.max-text-length=450
tts.chunk-target-length=320
tts.elevenlabs.model-id=eleven_multilingual_v2
tts.elevenlabs.output-format=mp3_44100_128
tts.elevenlabs.optimize-streaming-latency=0
tts.voice.stability=0.45
tts.voice.similarity-boost=0.80
tts.voice.style=0.20
tts.voice.speaker-boost=true
tts.voice.host=${ELEVENLABS_HOST_VOICE_ID:}
tts.voice.guest=${ELEVENLABS_GUEST_VOICE_ID:}
tts.retry.max-attempts=3
tts.retry.delay-ms=1500

storage.local.root=storage
queue.poll-delay-ms=3000

security.user.username=${APP_USERNAME:admin}
security.user.password=${APP_PASSWORD:changeit}
security.jwt.secret=${JWT_SECRET_BASE64:VGhpc0lzQURldmVsb3BtZW50U2VjcmV0S2V5Rm9ySldUU2lnbmluZzEyMzQ1Njc4OTA=}
security.jwt.expiration-seconds=86400
security.rate-limit.requests-per-minute=60
